name: trajectory-prediction
description: Predict future trajectories of surrounding vehicles and pedestrians using LSTM, Transformers, and physics-based models
category: adas-prediction

instructions: |
  Implement trajectory prediction for ADAS:

  Physics-based models:
  - Constant Velocity (CV)
  - Constant Acceleration (CA)
  - Constant Turn Rate and Velocity (CTRV)
  - Bicycle model for vehicles

  Machine learning approaches:
  - LSTM/GRU for temporal sequences
  - Transformers for attention mechanisms
  - Social pooling for interaction modeling
  - Goal-based prediction with intent

  Input features:
  - Historical positions (3-5 seconds)
  - Velocity and acceleration
  - Heading and yaw rate
  - Lane information and road geometry
  - Surrounding traffic context

  Output:
  - Multiple trajectory hypotheses (top-k)
  - Probability distribution over trajectories
  - Prediction horizon: 3-8 seconds
  - Update rate: 10 Hz

  Performance metrics:
  - Average Displacement Error (ADE)
  - Final Displacement Error (FDE)
  - Miss Rate at thresholds

dependencies:
  - PyTorch or TensorFlow for ML
  - NumPy for physics models

examples:
  - description: "LSTM trajectory predictor"
    input: "Predict vehicle trajectory using LSTM"
    output: |
      ```python
      import torch
      import torch.nn as nn

      class TrajectoryPredictor(nn.Module):
          def __init__(self, input_dim=4, hidden_dim=128, num_layers=2):
              super().__init__()
              self.lstm = nn.LSTM(input_dim, hidden_dim, num_layers, batch_first=True)
              self.fc = nn.Linear(hidden_dim, 2)  # (x, y) prediction

          def forward(self, x):
              # x: (batch, seq_len, input_dim)
              lstm_out, _ = self.lstm(x)
              pred = self.fc(lstm_out[:, -1, :])  # Last timestep
              return pred
      ```


name: mpc-controller
description: Model Predictive Control for lateral and longitudinal vehicle control with constraint handling
category: adas-control

instructions: |
  Implement MPC for autonomous vehicle control:

  Lateral control:
  - Track desired trajectory with minimal deviation
  - Minimize steering effort for comfort
  - Handle steering rate and angle constraints
  - Predict 1-2 seconds ahead (10-20 steps)

  Longitudinal control:
  - Maintain target speed or follow lead vehicle
  - Smooth acceleration/deceleration
  - Respect powertrain limits
  - Coordinate with lateral control

  Vehicle models:
  - Kinematic bicycle model (low speed)
  - Dynamic bicycle model (high speed)
  - Consider tire slip and saturation

  Optimization:
  - Quadratic programming (QP) for linear MPC
  - Sequential Quadratic Programming (SQP) for nonlinear MPC
  - Real-time capable (< 50ms solve time)

dependencies:
  - cvxpy or qpOASES for QP solving
  - CasADi for nonlinear optimization
  - NumPy for matrix operations

examples:
  - description: "Linear MPC for lateral control"
    input: "Implement MPC controller for lane keeping"
    output: |
      ```python
      import numpy as np
      import cvxpy as cp
      from dataclasses import dataclass
      from typing import List, Tuple

      @dataclass
      class MPCConfig:
          prediction_horizon: int = 20
          control_horizon: int = 20
          dt: float = 0.1
          wheelbase: float = 2.7
          max_steer: float = np.deg2rad(30)
          max_steer_rate: float = np.deg2rad(60)  # per second

      @dataclass
      class VehicleState:
          x: float  # Global x
          y: float  # Global y
          yaw: float  # Heading
          v: float  # Velocity

      @dataclass
      class Trajectory:
          x: np.ndarray
          y: np.ndarray
          yaw: np.ndarray
          v: np.ndarray

      class LateralMPC:
          def __init__(self, config: MPCConfig):
              self.config = config
              self.N = config.prediction_horizon
              self.dt = config.dt

              # Cost weights
              self.Q = np.diag([1.0, 1.0, 0.5, 0.1])  # State: [x_err, y_err, yaw_err, v_err]
              self.R = np.diag([0.01, 0.01])  # Control: [steer, accel]
              self.Rd = np.diag([0.01, 0.01])  # Control rate penalty

              self.last_steer = 0.0
              self.last_accel = 0.0

          def compute_control(self, state: VehicleState, trajectory: Trajectory) -> Tuple[float, float]:
              """
              Compute optimal steering and acceleration
              Returns: (steer_angle, acceleration)
              """
              # Linearize dynamics around current state
              A, B = self._linearize_dynamics(state)

              # Find closest point on trajectory
              ref_idx = self._find_closest_point(state, trajectory)

              # Extract reference trajectory segment
              ref_states = self._get_reference_segment(trajectory, ref_idx, self.N)

              # Setup optimization problem
              nx = 4  # State dimension
              nu = 2  # Control dimension

              # Decision variables
              x = cp.Variable((nx, self.N + 1))
              u = cp.Variable((nu, self.N))

              # Cost function
              cost = 0.0
              constraints = []

              # Initial state constraint
              x_0 = np.array([state.x, state.y, state.yaw, state.v])
              constraints.append(x[:, 0] == x_0)

              for k in range(self.N):
                  # State error cost
                  state_error = x[:, k] - ref_states[:, k]
                  cost += cp.quad_form(state_error, self.Q)

                  # Control cost
                  cost += cp.quad_form(u[:, k], self.R)

                  # Control rate cost
                  if k == 0:
                      u_prev = np.array([self.last_steer, self.last_accel])
                  else:
                      u_prev = u[:, k - 1]
                  du = u[:, k] - u_prev
                  cost += cp.quad_form(du, self.Rd)

                  # Dynamics constraint
                  constraints.append(x[:, k + 1] == A @ x[:, k] + B @ u[:, k])

                  # Control constraints
                  constraints.append(u[0, k] >= -self.config.max_steer)
                  constraints.append(u[0, k] <= self.config.max_steer)

                  # Steering rate constraint
                  if k == 0:
                      steer_rate = (u[0, k] - self.last_steer) / self.dt
                  else:
                      steer_rate = (u[0, k] - u[0, k - 1]) / self.dt
                  constraints.append(steer_rate >= -self.config.max_steer_rate)
                  constraints.append(steer_rate <= self.config.max_steer_rate)

              # Terminal cost
              terminal_error = x[:, self.N] - ref_states[:, self.N - 1]
              cost += cp.quad_form(terminal_error, self.Q * 10)

              # Solve optimization
              problem = cp.Problem(cp.Minimize(cost), constraints)
              problem.solve(solver=cp.OSQP, verbose=False)

              if problem.status != cp.OPTIMAL:
                  print(f"MPC solver status: {problem.status}")
                  return self.last_steer, self.last_accel

              # Extract first control action
              steer_angle = u[0, 0].value
              acceleration = u[1, 0].value

              self.last_steer = steer_angle
              self.last_accel = acceleration

              return steer_angle, acceleration

          def _linearize_dynamics(self, state: VehicleState) -> Tuple[np.ndarray, np.ndarray]:
              """Linearize kinematic bicycle model"""
              v = state.v
              yaw = state.yaw
              L = self.config.wheelbase

              # State: [x, y, yaw, v]
              # Control: [steer, accel]

              # A matrix (state transition)
              A = np.array([
                  [1, 0, -v * np.sin(yaw) * self.dt, np.cos(yaw) * self.dt],
                  [0, 1, v * np.cos(yaw) * self.dt, np.sin(yaw) * self.dt],
                  [0, 0, 1, 0],
                  [0, 0, 0, 1]
              ])

              # B matrix (control input)
              B = np.array([
                  [0, 0],
                  [0, 0],
                  [v * self.dt / L, 0],
                  [0, self.dt]
              ])

              return A, B

          def _find_closest_point(self, state: VehicleState, trajectory: Trajectory) -> int:
              """Find closest point on trajectory"""
              distances = np.hypot(trajectory.x - state.x, trajectory.y - state.y)
              return np.argmin(distances)

          def _get_reference_segment(self, trajectory: Trajectory, start_idx: int, length: int) -> np.ndarray:
              """Extract reference trajectory segment"""
              ref_states = np.zeros((4, length))

              for i in range(length):
                  idx = min(start_idx + i, len(trajectory.x) - 1)
                  ref_states[0, i] = trajectory.x[idx]
                  ref_states[1, i] = trajectory.y[idx]
                  ref_states[2, i] = trajectory.yaw[idx]
                  ref_states[3, i] = trajectory.v[idx]

              return ref_states


      # Usage
      if __name__ == "__main__":
          config = MPCConfig(
              prediction_horizon=20,
              dt=0.1,
              wheelbase=2.7,
              max_steer=np.deg2rad(30)
          )

          controller = LateralMPC(config)

          # Current vehicle state
          state = VehicleState(x=0.0, y=0.0, yaw=0.0, v=10.0)

          # Reference trajectory (circular path)
          t = np.linspace(0, 10, 100)
          radius = 50.0
          trajectory = Trajectory(
              x=radius * np.cos(t / radius),
              y=radius * np.sin(t / radius),
              yaw=t / radius + np.pi / 2,
              v=np.ones_like(t) * 10.0
          )

          # Simulate control loop
          for _ in range(50):
              steer, accel = controller.compute_control(state, trajectory)

              print(f"State: ({state.x:.2f}, {state.y:.2f}), "
                    f"Steer: {np.rad2deg(steer):.2f}°, Accel: {accel:.2f} m/s²")

              # Update state (kinematic bicycle model)
              state.x += state.v * np.cos(state.yaw) * config.dt
              state.y += state.v * np.sin(state.yaw) * config.dt
              state.yaw += state.v / config.wheelbase * np.tan(steer) * config.dt
              state.v += accel * config.dt
      ```


  ## Validation Criteria

  - Steady-state lateral acceleration: ±0.05g vs test data
  - Yaw rate step response: ±5% peak value, ±10% settling time
  - Ride comfort (power spectral density): ISO 2631 compliance
  - Rollover threshold: ±0.1g critical lateral acceleration
  - Brake-in-turn behavior: qualitative match to driver feedback


  author: "Automotive Claude Code Agents"
  created: "2026-03-19"
  autosar_version: "4.2.2"
  compatible_tools: ["EB tresos", "Arctic Core", "Davinci Configurator"]
  references:
    - "AUTOSAR_SWS_RTE.pdf"
    - "AUTOSAR_TPS_SoftwareComponentTemplate.pdf"
    - "AUTOSAR_EXP_LayeredSoftwareArchitecture.pdf"
